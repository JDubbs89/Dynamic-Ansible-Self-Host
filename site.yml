---
- name: Deploy self-hosted services stack (single Traefik layer)
  hosts: all
  become: true
  
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: always

  roles:
    - role: base
      tags: [base, always]
    
    - role: tailscale
      tags: [tailscale, vpn]
    
    - role: traefik
      tags: [traefik, proxy]
    
    - role: matrix
      tags: [matrix, chat]
    
    - role: pelican
      tags: [pelican, gameserver]

  post_tasks:
    - name: Configure Traefik routing for Matrix services
      block:
        - name: Generate Matrix Traefik routes
          template:
            src: roles/matrix/templates/traefik-matrix-routes.yml.j2
            dest: /opt/homelab/traefik/config/matrix-routes.yml
            mode: '0644'
          register: matrix_routes
        
        - name: Append Matrix routes to dynamic config
          shell: |
            # Remove old matrix routes section if exists
            sed -i '/# BEGIN MATRIX ROUTES/,/# END MATRIX ROUTES/d' /opt/homelab/traefik/config/dynamic.yml
            # Append new matrix routes
            cat /opt/homelab/traefik/config/matrix-routes.yml >> /opt/homelab/traefik/config/dynamic.yml
          when: matrix_routes.changed
          notify: restart traefik
      tags: [matrix, traefik]
      when: ansible_run_tags is defined and ('matrix' in ansible_run_tags or 'all' in ansible_run_tags)
    
    - name: Display completion message
      debug:
        msg:
          - "=========================================="
          - "Deployment complete!"
          - "=========================================="
          - ""
          - "Architecture: Single Traefik layer (no nested proxies)"
          - ""
          - "Services:"
          - "  - Synapse (Matrix homeserver): http://{{ matrix_domain }}"
          - "  - Element Web: http://{{ element_domain }}"
          - "  - Element Call: http://call.{{ base_domain }}"
          - "  - Pelican Panel: http://panel.{{ base_domain }}"
          - "  - Wings API: http://wings.{{ base_domain }}"
          - ""
          - "Access via Tailscale: 100.94.255.52"
          - "SSH: {{ ansible_host }}:22"
          - ""
          - "Next: Create Matrix user via:"
          - "  ssh ubuntu@{{ ansible_host }}"
          - "  docker exec matrix-synapse register_new_matrix_user -u myuser -p mypass http://localhost:8008"
          - "  2. Visit https://{{ pelican_panel_domain }}/installer"
          - "  3. Visit https://{{ element_domain }} to access Matrix"
          - "=========================================="
      tags: always
